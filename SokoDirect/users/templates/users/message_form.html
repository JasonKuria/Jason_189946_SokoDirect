```html
{% extends 'main.html' %}

{% block content %}

<main class="formPage my-xl">

    <div class="content-box">

        <div class="formWrapper">

            <a
                class="backButton"
                href="{% url 'user_profile' recipient.id %}"
            >
                <i class="im im-angle-left"></i>
            </a>

            <form
                class="form"
                method="POST"
            >

                {% csrf_token %}

                {% if not request.user.is_authenticated %}

                    <div class="form__field">
                        <label>{{ form.name.label }}</label>
                        {{ form.name }}
                    </div>

                    <div class="form__field">
                        <label>{{ form.email.label }}</label>
                        {{ form.email }}
                    </div>

                {% endif %}

                <div class="form__field">
                    <label>{{ form.subject.label }}</label>
                    {{ form.subject }}
                </div>

                <div class="form__field">
                    <label>{{ form.body.label }}</label>
                    {{ form.body }}
                </div>

                <input
                    class="btn btn--sub btn--lg my-md"
                    type="submit"
                    value="Send Message"
                >

            </form>

        </div>

    </div>

</main>

{% endblock content %}
```
